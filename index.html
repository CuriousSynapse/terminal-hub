    <style>

        .todo-check.done::after { content: '✓'; font-size: 11px; color: #fff; font-weight: 700; }

        .todo-content { flex: 1; min-width: 0; }
        .todo-text { font-family: var(--font-mono); font-size: var(--text-sm); color: var(--text-bright); font-weight: 500; word-break: break-word; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-muted); font-weight: 400; }

        .todo-meta { display: flex; gap: var(--sp-2); margin-top: 4px; flex-wrap: wrap; align-items: center; }
        .tag { font-family: var(--font-mono); font-size: var(--text-2xs); padding: 1px var(--sp-2); border-radius: 3px; white-space: nowrap; font-weight: 500; display: inline-flex; align-items: center; gap: 3px; }
        .tag-due { color: var(--blue-tag); background: var(--blue-tag-dim); }

        .todo-delete { padding: var(--sp-1); border-radius: var(--radius); color: var(--text-faint); transition: all var(--ease); opacity: 0; font-size: var(--text-sm); flex-shrink: 0; margin-top: 1px; }
        .todo-item:hover .todo-delete { opacity: 1; }

<body>
    <div id="app"></div>

    <!-- Terminal bar fixed at bottom -->
    <div class="terminal-bar">
        <span class="terminal-prompt">➜</span>
        <input type="text" id="terminalInput" placeholder="Type commands like: open section Finance" autocomplete="off" spellcheck="false">
    </div>

    <script>
        // Use the complete JavaScript from the original app.js with terminal command integration
        'use strict';

        // STORAGE
        const STORAGE_KEY = 'terminalHubV2';
        const store = (function() {
            try {
                const s = window.localStorage;
                s.setItem('t', '1');
                s.removeItem('t');
                return s;
            } catch {
                return null;
            }
        })();

        function getDefault() {
            return { sections: [], folders: [] };
        }

        let data = load();

        function load() {
            if (!store) return getDefault();
            try {
                const raw = store.getItem(STORAGE_KEY);
                if (!raw) return getDefault();
                const p = JSON.parse(raw);
                if (!p.sections) p.sections = [];
                if (!p.folders) p.folders = [];
                p.sections.forEach(s => { if (!s.folder) s.folder = 'root'; });
                p.folders.forEach(f => { if (!f.parent) f.parent = 'root'; });
                return p;
            } catch {
                return getDefault();
            }
        }

        function save() {
            if (!store) return;
            try {
                store.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch {}
        }

        // UTIL
        const app = document.getElementById('app');

        function uid() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ROUTING
        let currentView = 'desktop';
        let currentFolder = 'root';
        let currentSectionView = null;
        let commandHistory = [];
        let historyIndex = 0;

        function navigate(view) {
            currentView = view;
            render();
        }

        function getCurrentPath() {
            let path = '/';
            if (currentFolder !== 'root') {
                const parts = [];
                let folderId = currentFolder;
                while (folderId && folderId !== 'root') {
                    const folder = data.folders.find(f => f.id === folderId);
                    if (!folder) break;
                    parts.unshift(folder.name);
                    folderId = folder.parent;
                }
                path = '/' + parts.join('/');
            }
            if (currentSectionView) {
                const sec = data.sections.find(s => s.id === currentSectionView);
                if (sec) path += '/' + sec.name;
            }
            return path;
        }

        // CLOCK
        function clockStr() {
            return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        }

        let clockInterval = null;
        function startClock() {
            if (clockInterval) clearInterval(clockInterval);
            clockInterval = setInterval(() => {
                const el = document.getElementById('clock');

                el.className = 'toast';
                document.body.appendChild(el);

            el.textContent = msg;
            el.style.whiteSpace = 'pre-line';
            el.style.textAlign = 'left';
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), duration);

        function bindDesktopEvents() {
            const rootNav = document.querySelector('[data-nav-root]');
            if (rootNav) {
                rootNav.addEventListener('click', () => {
                    currentFolder = 'root';
                    render();
                });
            }

            document.querySelectorAll('[data-nav-folder]').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('[data-delete-folder]')) return;
                    currentFolder = el.dataset.navFolder;
                    render();
                });
            });

            document.querySelectorAll('[data-nav]').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('[data-delete-section]')) return;
                    currentSectionView = el.dataset.nav.split(':')[1];
                    render();
                });
            });

            document.querySelectorAll('[data-delete-folder]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.deleteFolder;
                    const folder = data.folders.find(f => f.id === id);
                    if (folder && confirm(`Delete "${folder.name}"? This will remove all its contents.`)) {
                        function deleteRecursive(folderId) {
                            data.sections = data.sections.filter(s => s.folder !== folderId);
                            const subfolders = data.folders.filter(f => f.parent === folderId);
                            subfolders.forEach(sf => deleteRecursive(sf.id));
                            data.folders = data.folders.filter(f => f.id !== folderId);
                        }
                        deleteRecursive(id);
                        save();
                        render();
                    }
                });
            });

            document.querySelectorAll('[data-delete-section]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.deleteSection;
                    const sec = data.sections.find(s => s.id === id);

                                    ${l.label ? `<div style="font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-muted);word-break:break-all">${esc(l.path)}</div>` : ''}

        function getLinkIcon(path) {
            if (!path) return '📄';
            const p = path.toLowerCase();
            if (p.includes('http') || p.includes('https')) return '🌐';
            if (p.endsWith('.xlsx') || p.endsWith('.xls') || p.endsWith('.csv')) return '📊';
            if (p.endsWith('.pdf')) return '📄';
            if (p.endsWith('.doc') || p.endsWith('.docx')) return '📝';
            if (p.endsWith('.ppt') || p.endsWith('.pptx')) return '📽️';
            if (p.endsWith('.jpg') || p.endsWith('.png') || p.endsWith('.gif')) return '🖼️';
            if (p.endsWith('.mp4') || p.endsWith('.mov')) return '🎬';
            if (p.endsWith('.mp3') || p.endsWith('.wav')) return '🎵';
            if (p.endsWith('.zip') || p.endsWith('.rar')) return '📦';
            if (p.endsWith('.py') || p.endsWith('.js') || p.endsWith('.ts')) return '💻';
            return '📄';
        }

        function bindSectionEvents(sectionId) {
            const sec = data.sections.find(s => s.id === sectionId);
            if (!sec) return;

            document.querySelector('[data-back="desktop"]').addEventListener('click', () => {
                currentSectionView = null;
                render();
            });

            document.getElementById('linkForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const path = document.getElementById('linkPath').value.trim();
                if (!path) return;
                const label = document.getElementById('linkLabel').value.trim();
                if (!sec.links) sec.links = [];
                sec.links.push({ id: uid(), path, label: label || '' });
                save();
                showToast('Link added');
                renderSection(sectionId);
            });

            document.querySelectorAll('[data-link]').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('[data-del-link]')) return;
                    const url = el.dataset.link;
                    openLink(url);
                });
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.target.closest('[data-del-link]')) {
                        const url = el.dataset.link;
                        openLink(url);
                    }
                });
                el.setAttribute('tabindex', '0');
            });

            document.querySelectorAll('[data-del-link]').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    sec.links = (sec.links || []).filter(l => l.id !== el.dataset.delLink);
                    save();
                    showToast('Link removed');
                    renderSection(sectionId);
                });
            });

            document.getElementById('editSectionBtn').addEventListener('click', () => showSectionModal(sectionId));
        }

        function openLink(url) {
            if (!url) return;
            
            if (url.match(/^https?:\/\//i)) {
                window.open(url, '_blank', 'noopener,noreferrer');
                showToast('Opening link...');
            } else if (url.match(/^file:\/\//i)) {
                window.open(url, '_blank');
                showToast('Opening file...');
            } else {
                const fileUrl = 'file:///' + url.replace(/\\/g, '/');
                window.open(fileUrl, '_blank');
                showToast(`Opening: ${url}`);
            }
        }

        function renderTodos() {
            const allTodos = data.todos;
            const total = allTodos.length;
            const done = allTodos.filter(t => t.done).length;
            const active = total - done;

            let items = [...allTodos];
            if (todoFolder !== 'All') items = items.filter(t => (t.folder || 'Inbox') === todoFolder);
            if (todoFilter === 'active') items = items.filter(t => !t.done);
            else if (todoFilter === 'completed') items = items.filter(t => t.done);
            if (todoSearch) {
                const q = todoSearch.toLowerCase();
                items = items.filter(t => t.text.toLowerCase().includes(q));
            }

            items.sort((a, b) => {
                if (a.done !== b.done) return a.done ? 1 : -1;
                if (a.due && b.due) return a.due.localeCompare(b.due);
                if (a.due) return -1;
                if (b.due) return 1;
                return b.created - a.created;
            });

            const folderCounts = { 'All': total };
            data.folders.forEach(f => folderCounts[f] = 0);
            allTodos.forEach(t => {
                const f = t.folder || 'Inbox';
                folderCounts[f] = (folderCounts[f] || 0) + 1;
            });

            let html = `
                <div class="topbar">
                    <div class="breadcrumb">
                        <span class="breadcrumb-link" data-nav="gallery">Home</span>
                        <span class="breadcrumb-sep">›</span>
                        <span class="breadcrumb-current">To-Dos</span>
                    </div>
                    <div class="topbar-right">
                        <span class="topbar-clock" id="clock">${clockStr()}</span>
                    </div>
                </div>

                <div class="section-view">
                    ${total > 0 ? `
                        <div class="progress-section">
                            <div class="progress-header">
                                <span class="progress-label">Progress</span>
                                <span class="progress-pct">${Math.round(done/total*100)}%</span>
                            </div>
                            <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(done/total*100)}%"></div></div>
                        </div>
                    ` : ''}

                    <form class="todo-form" id="todoForm">
                        <input type="text" id="todoInput" placeholder="What needs to be done?" required>
                        <input type="date" id="todoDue" title="Due date">
                        <select id="todoPriority">
                            <option value="normal">Normal</option>
                            <option value="high">High</option>
                            <option value="low">Low</option>
                        </select>
                        ${data.folders.length > 1 ? `
                            <select id="todoFolderSelect">
                                ${data.folders.map(f => `<option value="${esc(f)}" ${f === (todoFolder !== 'All' ? todoFolder : 'Inbox') ? 'selected' : ''}>${esc(f)}</option>`).join('')}
                            </select>
                        ` : ''}
                        <button type="submit" class="btn-primary">Add</button>
                    </form>

                    <div class="quick-dates">
                        <button class="quick-date" data-qd="today">Today</button>
                        <button class="quick-date" data-qd="tomorrow">Tomorrow</button>
                        <button class="quick-date" data-qd="this-week">This week</button>
                        <button class="quick-date" data-qd="next-week">Next week</button>
                        <button class="quick-date" data-qd="clear">No date</button>
                    </div>

                    <div class="folder-bar">
                        <button class="folder-tab ${todoFolder === 'All' ? 'active' : ''}" data-folder="All">All <span class="folder-count">${folderCounts['All']}</span></button>
                        ${data.folders.map(f => `
                            <button class="folder-tab ${todoFolder === f ? 'active' : ''}" data-folder="${esc(f)}">
                                ${esc(f)} <span class="folder-count">${folderCounts[f] || 0}</span>
                                ${f !== 'Inbox' ? `<span class="folder-delete" data-del-folder="${esc(f)}">✕</span>` : ''}
                            </button>
                        `).join('')}
                        <button class="folder-add" id="addFolderBtn" title="New folder">+ Folder</button>
                    </div>

                    <div class="filter-bar">
                        ${['all', 'active', 'completed'].map(f => `
                            <button class="filter-chip ${todoFilter === f ? 'active' : ''}" data-filter="${f}">${f.charAt(0).toUpperCase() + f.slice(1)}</button>
                        `).join('')}
                        <input type="text" class="todo-search" id="todoSearchInput" placeholder="Search..." value="${esc(todoSearch)}">
                    </div>

                    <div class="todo-list" id="todoList">
                        ${items.length === 0 ? `
                            <div class="empty">No tasks${todoFilter !== 'all' || todoFolder !== 'All' || todoSearch ? ' matching filters' : ''}. Add one above.</div>
                        ` : items.map(t => `
                            <div class="todo-item ${t.done ? 'completed' : ''}" data-id="${t.id}">
                                <div class="todo-check ${t.done ? 'done' : ''}" data-toggle="${t.id}"></div>
                                <div class="todo-content">
                                    <div class="todo-text">${esc(t.text)}</div>
                                    <div class="todo-meta">
                                        ${t.due ? `<span class="tag tag-due">${new Date(t.due + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>` : ''}
                                    </div>
                                </div>
                                <button class="todo-delete" data-del="${t.id}" title="Delete">✕</button>

                    </div>
                </div>
            `;

            app.innerHTML = html;
            bindTodoEvents();
            startClock();
        }

        function bindTodoEvents() {
            bindBreadcrumb();

            document.getElementById('todoForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const text = document.getElementById('todoInput').value.trim();
                if (!text) return;
                const folderSelect = document.getElementById('todoFolderSelect');
                const folder = folderSelect ? folderSelect.value : (todoFolder !== 'All' ? todoFolder : 'Inbox');
                data.todos.push({
                    id: uid(),
                    text,
                    due: document.getElementById('todoDue').value || null,
                    priority: document.getElementById('todoPriority').value,
                    done: false,
                    created: Date.now(),
                    folder: folder
                });
                save();
                showToast('Task added');
                render();
            });

            document.querySelectorAll('[data-toggle]').forEach(el => {
                el.addEventListener('click', () => {
                    const t = data.todos.find(x => x.id === el.dataset.toggle);
                    if (t) {
                        t.done = !t.done;
                        save();
                        showToast(t.done ? 'Task completed' : 'Task reopened');
                        render();
                    }
                });
            });

            document.querySelectorAll('[data-del]').forEach(el => {
                el.addEventListener('click', () => {
                    data.todos = data.todos.filter(x => x.id !== el.dataset.del);
                    save();
                    showToast('Task deleted');
                    render();
                });
            });

            document.querySelectorAll('[data-filter]').forEach(el => {
                el.addEventListener('click', () => {
                    todoFilter = el.dataset.filter;
                    render();
                });
            });

            document.querySelectorAll('[data-folder]').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('[data-del-folder]')) return;
                    todoFolder = el.dataset.folder;
                    render();
                });
            });

            document.querySelectorAll('[data-del-folder]').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const fname = el.dataset.delFolder;
                    if (confirm(`Delete folder "${fname}"? Tasks will move to Inbox.`)) {
                        data.todos.forEach(t => { if (t.folder === fname) t.folder = 'Inbox'; });
                        data.folders = data.folders.filter(f => f !== fname);
                        if (todoFolder === fname) todoFolder = 'All';
                        save();
                        render();
                    }
                });
            });

            const addFolderBtn = document.getElementById('addFolderBtn');
            if (addFolderBtn) {
                addFolderBtn.addEventListener('click', showFolderModal);
            }

            const searchInput = document.getElementById('todoSearchInput');
            if (searchInput) {
                let debounce = null;
                searchInput.addEventListener('input', () => {
                    clearTimeout(debounce);
                    debounce = setTimeout(() => {
                        todoSearch = searchInput.value;
                        render();
                    }, 200);
                });
            }
        }

        function showFolderModal() {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal">
                    <h3>New Folder</h3>
                    <div class="modal-field">
                        <label style="display:block;margin-bottom:var(--sp-2);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-muted)">Folder name</label>
                        <input type="text" id="folderNameInput" placeholder="e.g. Projects, Documents, Work..." required style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:var(--sp-2) var(--sp-3);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text)">
                    </div>
                    <div class="modal-actions" style="margin-top:var(--sp-6);display:flex;gap:var(--sp-2);justify-content:flex-end">
                        <button class="btn-top" id="folderCancel">Cancel</button>
                        <button class="btn-primary" id="folderSave">Create</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const nameInput = overlay.querySelector('#folderNameInput');
            nameInput.focus();

            function doSave() {
                const name = nameInput.value.trim();
                if (!name) return;
                if (data.folders.find(f => f.parent === currentFolder && f.name === name)) {
                    showToast('Folder already exists here');
                    return;
                }
                data.folders.push({
                    id: uid(),
                    name,
                    parent: currentFolder
                });
                save();
                overlay.remove();
                render();
                showToast('Folder created');
            }

            overlay.querySelector('#folderCancel').addEventListener('click', () => overlay.remove());
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
            overlay.querySelector('#folderSave').addEventListener('click', doSave);
            nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doSave(); } });
        }

        // SECTION MODAL
        function showSectionModal(editId) {
            const existing = editId ? data.sections.find(s => s.id === editId) : null;

            const COLORS = [
                { name: 'blue', hex: '#3b82f6' },
                { name: 'purple', hex: '#a78bfa' },
                { name: 'orange', hex: '#f59e0b' },
                { name: 'cyan', hex: '#22d3ee' },
                { name: 'pink', hex: '#f472b6' },
                { name: 'green', hex: '#22c55e' },
                { name: 'teal', hex: '#2dd4bf' },
                { name: 'red', hex: '#ef4444' }
            ];

            const ICONS = ['📄', '💼', '🎓', '💡', '🎯', '📊', '🔧', '🌟', '🚀', '📚', '🎨', '💻'];

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal">
                    <h3>${existing ? 'Edit Section' : 'New Section'}</h3>
                    <div class="modal-field" style="margin-bottom:var(--sp-4)">
                        <label style="display:block;margin-bottom:var(--sp-2);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-muted)">Name</label>
                        <input type="text" id="secName" value="${existing ? esc(existing.name) : ''}" placeholder="e.g. Finance, Fitness, Meals..." required style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:var(--sp-2) var(--sp-3);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text)">
                    </div>
                    <div class="modal-field" style="margin-bottom:var(--sp-4)">
                        <label style="display:block;margin-bottom:var(--sp-2);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-muted)">Description (optional)</label>
                        <textarea id="secDesc" placeholder="What is this section for?" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:var(--sp-2) var(--sp-3);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text);min-height:60px">${existing && existing.description ? esc(existing.description) : ''}</textarea>
                    </div>
                    <div class="modal-field" style="margin-bottom:var(--sp-4)">
                        <label style="display:block;margin-bottom:var(--sp-2);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-muted)">Icon</label>
                        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:var(--sp-2)" id="iconPicker">
                            ${ICONS.map(ic => `<div class="icon-option ${existing && existing.icon === ic ? 'active' : ''}" data-icon="${ic}" style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:1.2rem;transition:all var(--ease)">${ic}</div>`).join('')}
                        </div>
                    </div>
                    <div class="modal-field" style="margin-bottom:var(--sp-4)">
                        <label style="display:block;margin-bottom:var(--sp-2);font-family:var(--font-mono);font-size:var(--text-sm);color:var(--text-muted)">Color</label>
                        <div style="display:flex;gap:var(--sp-2);flex-wrap:wrap" id="colorPicker">
                            ${COLORS.map(c => `<div class="color-dot ${existing && existing.color === c.name ? 'active' : ''}" data-color="${c.name}" style="width:32px;height:32px;border-radius:50%;background:${c.hex};cursor:pointer;border:2px solid transparent;transition:all var(--ease)"></div>`).join('')}
                        </div>
                    </div>
                    <div class="modal-actions" style="margin-top:var(--sp-6);display:flex;gap:var(--sp-2);justify-content:flex-end">
                        <button class="btn-top" id="modalCancel">Cancel</button>
                        <button class="btn-primary" id="modalSave">${existing ? 'Save' : 'Create'}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            let selectedIcon = existing ? existing.icon : ICONS[0];
            let selectedColor = existing ? existing.color : COLORS[0].name;

            if (!existing) {
                overlay.querySelector(`[data-icon="${ICONS[0]}"]`).classList.add('active');
                overlay.querySelector(`[data-color="${COLORS[0].name}"]`).classList.add('active');
            }

            overlay.querySelectorAll('.icon-option').forEach(el => {
                el.addEventListener('click', () => {
                    overlay.querySelectorAll('.icon-option').forEach(x => {
                        x.classList.remove('active');
                        x.style.borderColor = 'var(--border)';
                    });
                    el.classList.add('active');
                    el.style.borderColor = 'var(--accent)';
                    selectedIcon = el.dataset.icon;
                });
            });

            overlay.querySelectorAll('.color-dot').forEach(el => {
                el.addEventListener('click', () => {
                    overlay.querySelectorAll('.color-dot').forEach(x => {
                        x.classList.remove('active');
                        x.style.borderColor = 'transparent';
                    });
                    el.classList.add('active');
                    el.style.borderColor = 'var(--accent)';
                    selectedColor = el.dataset.color;
                });
            });

            overlay.querySelector('#modalCancel').addEventListener('click', () => overlay.remove());
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

            overlay.querySelector('#modalSave').addEventListener('click', () => {
                const name = overlay.querySelector('#secName').value.trim();
                if (!name) return;
                const desc = overlay.querySelector('#secDesc').value.trim();

                if (existing) {
                    existing.name = name;
                    existing.description = desc;
                    existing.icon = selectedIcon;
                    existing.color = selectedColor;
                    renderSection(existing.id);
                } else {
                    data.sections.push({
                        id: uid(),
                        name,
                        description: desc,
                        icon: selectedIcon,
                        color: selectedColor,
                        links: [],
                        folder: currentFolder
                    });
                    render();
                }

                save();
                overlay.remove();
            });

            overlay.querySelector('#secName').focus();
        }

        // EXPORT/IMPORT
        function exportData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `terminalhub-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('Data exported');
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if (!imported.sections) imported.sections = [];
                    if (!imported.folders) imported.folders = [];
                    imported.sections.forEach(s => { if (!s.folder) s.folder = 'root'; });
                    imported.folders.forEach(f => { if (!f.parent) f.parent = 'root'; });
                    data = imported;
                    save();
                    showToast('Data imported');
                    currentFolder = 'root';
                    currentSectionView = null;
                    render();
                } catch {
                    showToast('Invalid JSON file');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        // TERMINAL COMMAND INTEGRATION
        const terminalInput = document.getElementById('terminalInput');

        function handleCommand(input) {
            const trimmed = input.trim();
            if (!trimmed) return;

            commandHistory.push(trimmed);
            historyIndex = commandHistory.length;

            const parts = trimmed.split(/\s+/);
            const [cmd, ...args] = parts;

            // ls - list current directory contents
            if (cmd === 'ls') {
                const subfolders = data.folders.filter(f => f.parent === currentFolder);
                const sections = data.sections.filter(s => (s.folder || 'root') === currentFolder);
                
                let output = [];
                if (subfolders.length > 0) {
                    output.push('Folders:');
                    subfolders.forEach(f => output.push(`  📁 ${f.name}`));
                }
                if (sections.length > 0) {
                    output.push('Sections:');
                    sections.forEach(s => output.push(`  ${s.icon || '📄'} ${s.name}`));
                }
                if (output.length === 0) output.push('Empty directory');
                
                showToast(output.join('\n'), 3000);
                return;
            }

            // pwd - print working directory
            if (cmd === 'pwd') {
                showToast(getCurrentPath());
                return;
            }

            // cd - change directory
            if (cmd === 'cd') {
                const target = args.join(' ');
                
                if (!target || target === '~' || target === '/') {
                    currentFolder = 'root';
                    currentSectionView = null;
                    render();
                    return;
                }
                
                if (target === '..') {
                    if (currentSectionView) {
                        currentSectionView = null;
                        render();
                    } else {
                        const current = data.folders.find(f => f.id === currentFolder);
                        if (current && current.parent) {
                            currentFolder = current.parent;
                            render();
                        } else {
                            showToast('Already at root');
                        }
                    }
                    return;
                }

                const folder = data.folders.find(f => f.parent === currentFolder && f.name.toLowerCase() === target.toLowerCase());
                if (folder) {
                    currentFolder = folder.id;
                    currentSectionView = null;
                    render();
                    return;
                }

                const section = data.sections.find(s => (s.folder || 'root') === currentFolder && s.name.toLowerCase() === target.toLowerCase());
                if (section) {
                    currentSectionView = section.id;
                    renderSection(section.id);
                    return;
                }

                showToast(`cd: ${target}: No such file or directory`);
                return;
            }

            // open <index> - open link in current section
            if (cmd === 'open') {
                if (!currentSectionView) {
                    showToast('Not in a section. Use "cd <section>" first');
                    return;
                }

                const sec = data.sections.find(s => s.id === currentSectionView);
                if (!sec || !sec.links) {
                    showToast('No links in this section');
                    return;
                }

                const index = parseInt(args[0]);
                if (isNaN(index) || index < 0 || index >= sec.links.length) {
                    showToast(`Invalid index. Use 0-${sec.links.length - 1}`);
                    return;
                }

                const link = sec.links[index];
                openLink(link.path);
                return;
            }

            // mkdir - create new folder
            if (cmd === 'mkdir') {
                const name = args.join(' ');
                if (!name) {
                    showToast('Usage: mkdir <folder-name>');
                    return;
                }
                if (data.folders.find(f => f.parent === currentFolder && f.name === name)) {
                    showToast('Folder already exists');
                    return;
                }
                data.folders.push({
                    id: uid(),
                    name,
                    parent: currentFolder
                });
                save();
                showToast(`Created folder: ${name}`);
                render();
                return;
            }

            // touch - create new section
            if (cmd === 'touch') {
                const name = args.join(' ');
                if (!name) {
                    showToast('Usage: touch <section-name>');
                    return;
                }
                data.sections.push({
                    id: uid(),
                    name,
                    description: '',
                    icon: '📄',
                    color: 'blue',
                    links: [],
                    folder: currentFolder
                });
                save();
                showToast(`Created section: ${name}`);
                render();
                return;
            }

            // clear - clear terminal (visual feedback)
            if (cmd === 'clear') {
                showToast('Terminal cleared');
                return;
            }

            // help
            if (cmd === 'help') {
                showHelp();
                return;
            }

            showToast(`Command not found: ${cmd}\nType "help" for available commands`);
        }

        if (terminalInput) {
            terminalInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    handleCommand(terminalInput.value);
                    terminalInput.value = '';
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        terminalInput.value = commandHistory[historyIndex] || '';
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex < commandHistory.length - 1) {
                        historyIndex++;
                        terminalInput.value = commandHistory[historyIndex] || '';
                    } else {
                        historyIndex = commandHistory.length;
                        terminalInput.value = '';
                    }
                }
            });
        }

        // INIT
        render();
    </script>
</body>
</html>
